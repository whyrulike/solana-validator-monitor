version: "3.9"

services:
  monitor:
    build: .
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/app/config.yaml
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SOLANA_RPC_URLS=${SOLANA_RPC_URLS:-https://api.mainnet-beta.solana.com}
      - VALIDATOR_IDENTITIES=${VALIDATOR_IDENTITIES}
      - MONITOR_INTERVAL_SECONDS=${MONITOR_INTERVAL_SECONDS:-10}
      - RPC_HEALTH_CHECK_INTERVAL=${RPC_HEALTH_CHECK_INTERVAL:-30}
      - RPC_LATENCY_THRESHOLD_MS=${RPC_LATENCY_THRESHOLD_MS:-2000}
      - SLOT_MISS_THRESHOLD=${SLOT_MISS_THRESHOLD:-5}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
